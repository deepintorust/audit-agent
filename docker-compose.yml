services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ${MYSQL_DATABASE:-audit_agent}
      MYSQL_USER: ${MYSQL_USER:-audit}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-audit}
    ports:
      - "3306:3306"
    volumes:
      - ./volumes/mysql:/var/lib/mysql
      - ./scripts/init_mysql.sql:/docker-entrypoint-initdb.d/init_mysql.sql:ro
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 30

  rabbitmq:
    image: rabbitmq:management
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./volumes/rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30

  rustfs:
    # RustFS is S3-compatible object storage; keep env vars aligned with S3_* in .env
    image: rustfs/rustfs:latest
    environment:
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY_ID:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${S3_SECRET_ACCESS_KEY:-rustfsadmin}
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./volumes/rustfs:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "true"]
      interval: 5s
      timeout: 3s
      retries: 1

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./volumes/qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__ENABLE_STATIC_CONTENT: 1
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-}
    healthcheck:
      test: ["CMD", "sh", "-c", "true"]
      interval: 5s
      timeout: 3s
      retries: 1

  qdrant-init:
    platform: linux/arm64
    image: audit-agent:latest
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    env_file: .env
    depends_on:
      qdrant:
        condition: service_started
    command: ["python", "scripts/init_qdrant.py"]

  gateway:
    platform: linux/arm64
    image: audit-agent:latest
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./config/classification.yaml:/etc/audit-agent/classification.yaml:ro
      - ${BGE_M3_HOST_PATH:-./models/bge-m3}:/models/bge-m3:ro
      - ./prompts:/etc/audit-agent/prompts:ro
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      rustfs:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      qdrant-init:
        condition: service_completed_successfully
    command: ["uvicorn", "src.app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  worker-store:
    platform: linux/arm64
    image: audit-agent:latest
    env_file: .env
    environment:
      WORKER_QUEUE: doc.store.q
    volumes:
      - ./config/classification.yaml:/etc/audit-agent/classification.yaml:ro
      - ${BGE_M3_HOST_PATH:-./models/bge-m3}:/models/bge-m3:ro
      - ./prompts:/etc/audit-agent/prompts:ro
    depends_on:
      gateway:
        condition: service_started
      qdrant-init:
        condition: service_completed_successfully
    command: ["python", "-m", "src.workers.runner"]

  worker-parse:
